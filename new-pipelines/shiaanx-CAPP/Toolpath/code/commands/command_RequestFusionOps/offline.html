<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline - Fusion Add-In</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --bg-color: #0a0a0a;
        --text-color: #fafafa;
        --muted-color: #a1a1aa;
        --status-bg: #27272a;
        --success-bg: rgba(34, 197, 94, 0.1);
        --success-color: #22c55e;
      }

      body.light-theme {
        --bg-color: #fafafa;
        --text-color: #18181b;
        --muted-color: #71717a;
        --status-bg: #e4e4e7;
        --success-bg: rgba(34, 197, 94, 0.15);
        --success-color: #16a34a;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        background-color: var(--bg-color);
        color: var(--text-color);
        line-height: 1.5;
        transition: background-color 0.2s ease, color 0.2s ease;
      }

      .container {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .content {
        text-align: center;
        max-width: 448px;
      }

      .icon {
        width: 40px;
        height: 40px;
        margin: 0 auto 24px;
        color: var(--muted-color);
        opacity: 0.7;
      }

      .title {
        font-size: 30px;
        font-weight: 600;
        letter-spacing: -0.025em;
        margin-bottom: 12px;
      }

      .description {
        color: var(--muted-color);
        line-height: 1.625;
        margin-bottom: 32px;
      }

      .button-group {
        display: flex;
        gap: 12px;
        justify-content: center;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        background-color: #3b82f6;
        color: white;
        padding: 12px 24px;
        border-radius: 8px;
        font-weight: 500;
        font-size: 16px;
        border: none;
        cursor: pointer;
        transition: background-color 0.15s ease, border-color 0.15s ease;
      }

      .button:hover {
        background-color: #2563eb;
      }

      .button:active {
        transform: scale(0.98);
      }

      .button-secondary {
        background-color: transparent;
        color: var(--muted-color);
        border: 1px solid var(--muted-color);
      }

      .button-secondary:hover {
        background-color: var(--status-bg);
        border-color: var(--text-color);
        color: var(--text-color);
      }

      .button-icon {
        width: 18px;
        height: 18px;
      }

      .status {
        margin-top: 32px;
        padding: 12px 16px;
        background-color: var(--status-bg);
        border-radius: 8px;
        font-size: 14px;
        color: var(--muted-color);
        transition: background-color 0.2s ease, color 0.2s ease;
      }

      .status-success {
        background-color: var(--success-bg);
        color: var(--success-color);
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="content">
        <svg
          class="icon"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          stroke-width="1.5"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M8.288 15.038a5.25 5.25 0 017.424 0M5.106 11.856c3.807-3.808 9.98-3.808 13.788 0M1.924 8.674c5.565-5.565 14.587-5.565 20.152 0M12.53 18.22l-.53.53-.53-.53a.75.75 0 011.06 0z"
          />
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 3l18 18" />
        </svg>
        <h1 class="title">You're Offline</h1>
        <p class="description">
          Unable to connect to the server. This could be due to a network issue
          or the service may be temporarily unavailable.
        </p>
        <div class="button-group">
          <button onclick="closePalette()" class="button button-secondary">
            <svg
              class="button-icon"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              stroke-width="2"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M6 18L18 6M6 6l12 12"
              />
            </svg>
            Close
          </button>
          <button onclick="tryAgain()" class="button">
            <svg
              class="button-icon"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              stroke-width="2"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"
              />
            </svg>
            Try Again
          </button>
        </div>
        <div id="offline-status" class="status">Checking connection...</div>
      </div>
    </div>
    <script>
      (function () {
        var status = document.getElementById("offline-status");

        function checkConnection() {
          if (!navigator.onLine) {
            status.textContent = "No internet connection";
            status.className = "status";
          } else {
            status.textContent = "Waiting for server...";
            status.className = "status";
          }
        }

        window.addEventListener("online", function () {
          status.textContent = "Connection restored. Retrying...";
          status.className = "status status-success";
          setTimeout(function () {
            tryAgain();
          }, 1000);
        });

        checkConnection();
      })();

      function tryAgain() {
        var status = document.getElementById("offline-status");
        status.textContent = "Retrying...";
        status.className = "status";

        // Send message to Fusion to close and reopen the palette
        if (window.adsk && window.adsk.fusionSendData) {
          window.adsk.fusionSendData("retryConnection", "{}");
        } else {
          // Fallback if not running in Fusion - just reload
          window.location.reload();
        }
      }

      function closePalette() {
        // Send message to Fusion to close the palette
        if (window.adsk && window.adsk.fusionSendData) {
          window.adsk.fusionSendData("closePalette", "{}");
        }
      }

      // Theme handling
      function applyTheme(theme) {
        // LightGray and ClassicFusion are light themes
        // DarkBlue and MatchDeviceTheme (when dark) are dark themes
        var isLight = theme === "LightGray" || theme === "ClassicFusion";
        if (isLight) {
          document.body.classList.add("light-theme");
        } else {
          document.body.classList.remove("light-theme");
        }
      }

      // Get theme from URL parameter (passed by Fusion when opening offline page)
      function getThemeFromUrl() {
        var params = new URLSearchParams(window.location.search);
        return params.get("theme");
      }

      // Apply theme from URL parameter immediately
      var urlTheme = getThemeFromUrl();
      if (urlTheme) {
        applyTheme(urlTheme);
      }

      // Listen for theme changes from Fusion (if adsk is available)
      if (window.adsk) {
        window.adsk.fusionReceiveData = function (action, data) {
          if (action === "themeChanged") {
            try {
              var parsed = JSON.parse(data);
              applyTheme(parsed.theme);
            } catch (e) {
              console.error("Error parsing theme data:", e);
            }
          }
        };

        // If no URL theme, request config to get current theme
        if (!urlTheme) {
          window.adsk.fusionSendData("getConfig", "{}").then(function (result) {
            try {
              var config = JSON.parse(result);
              if (config.theme) {
                applyTheme(config.theme);
              }
            } catch (e) {
              console.error("Error parsing config:", e);
            }
          });
        }
      }
    </script>
  </body>
</html>
